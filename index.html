<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>MAPA DE HATCHERY BIOS.CV</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a3a4a">

<style>
  :root {
    --sand: #e8d5a3; --sand-dark: #c4a96e;
    --ocean: #1a3a4a; --ocean-mid: #2a5568; --ocean-light: #3d7a8a;
    --foam: #f0ece0; --green: #4a7c59; --green-light: #6aab7a;
    --amber: #c47a1e; --red: #a03030; --white: #faf8f2;
    --text: #1a2530; --text-muted: #5a7080;
    --radius: 6px; --shadow: 0 2px 12px rgba(26,58,74,0.15);
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  body { font-family: 'Lato', sans-serif; background: var(--ocean); color: var(--text); min-height:100vh; overflow-x:hidden; }
  header { background: var(--ocean); border-bottom:2px solid var(--ocean-light); padding:12px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
  .logo { font-family:'Space Mono', monospace; color: var(--sand); font-weight:700; letter-spacing:0.05em; display:flex; gap:10px; align-items:center; }
  .header-actions { display:flex; gap:8px; }
  .btn { font-family:'Space Mono', monospace; font-size:0.72rem; border:none; border-radius:var(--radius); padding:8px 14px; cursor:pointer; font-weight:700; text-transform:uppercase; transition:all 0.15s; }
  .btn-sand { background: var(--sand); color: var(--ocean); } .btn-sand:hover { background: var(--sand-dark); }
  .btn-ocean { background: var(--ocean-mid); color: var(--sand); border:1px solid var(--ocean-light); } .btn-ocean:hover { background: var(--ocean-light); }
  .btn-green { background: var(--green); color:white; } .btn-green:hover { background: var(--green-light); }
  .btn-red { background: var(--red); color:white; } .btn-red:hover { background:#c03030; }
  main { padding:16px; max-width:1400px; margin:0 auto; }
  .config-bar { background: var(--ocean-mid); border:1px solid var(--ocean-light); border-radius: var(--radius); padding:14px 18px; display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
  .config-bar label { font-family:'Space Mono'; font-size:0.72rem; color: var(--sand); display:flex; gap:8px; text-transform:uppercase; letter-spacing:0.05em; align-items:center; }
  .config-bar input[type=number] { width:64px; background: var(--ocean); border:1px solid var(--ocean-light); border-radius:4px; color: var(--sand); font-family:'Space Mono'; font-size:0.85rem; padding:5px 8px; text-align:center; }
  .config-bar input:focus { outline:2px solid var(--sand-dark); }
  .stats { margin-left:auto; display:flex; gap:16px; flex-wrap:wrap; }
  .stat-pill { background: var(--ocean); border:1px solid var(--ocean-light); border-radius:20px; padding:4px 12px; font-family:'Space Mono'; font-size:0.7rem; color: var(--sand); display:flex; align-items:center; gap:6px; }
  .stat-dot { width:8px;height:8px;border-radius:50%;display:inline-block; }
  .grid-wrapper { background: var(--ocean-mid); border:1px solid var(--ocean-light); border-radius:var(--radius); padding:16px; overflow:auto; max-height:calc(100vh - 220px); }
  .grid { display:grid; gap:4px; }
  .nest-cell { width:44px;height:44px;border-radius:5px;border:1.5px solid rgba(255,255,255,0.1); cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:'Space Mono'; font-size:0.58rem; font-weight:700; transition:transform 0.1s, box-shadow 0.1s; position:relative; user-select:none; }
  .nest-cell:hover { transform: scale(1.12); box-shadow:0 0 0 2px var(--sand); z-index:2; } .nest-cell:active { transform: scale(0.97); }
  .state-vazio { background: var(--ocean); color:#4a6a7a; border-color:#2a4a5a; }
  .state-ativo { background:#2a5c3a; color:#a0e0b0; border-color:#4a8c5a; }
  .state-eclodido { background:#5a4a1a; color:#f0c860; border-color:#8a7030; }
  .state-exumado { background:#4a1a1a; color:#e08080; border-color:#7a3030; }
  .state-monitorizar { background:#1a3a5a; color:#80b0e0; border-color:#3060a0; }
  .cell.fresh { background:#c8e6c9 !important; }
  .cell.mid { background:#ffe082 !important; }
  .cell.hatch { background:#ffab91 !important; }
  .cell.old { background:#ef5350 !important; }
</style>
</head>
<body>
<header>
  <div class="logo">🐢 MAPA DE HATCHERY BIOS.CV</div>
  <div class="header-actions">
    <button class="btn btn-ocean" onclick="openSettings()">⚙ Config</button>
    <button class="btn btn-sand" onclick="exportCSV()">↓ CSV</button>
    <button class="btn btn-green" onclick="backup()">💾 Backup</button>
  </div>
</header>
<main>
  <div class="config-bar">
    <label>Colunas <input type="number" id="cols" value="25" min="1" max="100" onchange="buildGrid()"></label>
    <label>Linhas <input type="number" id="rows" value="40" min="1" max="100" onchange="buildGrid()"></label>
    <div class="stats" id="stats"></div>
  </div>
  <div class="grid-wrapper"><div class="grid" id="grid"></div></div>
</main>

<!-- NEST MODAL -->
<div class="modal-bg" id="nestModal" style="display:none;position:fixed;inset:0;background:rgba(10,25,35,0.85);align-items:center;justify-content:center;z-index:200;">
  <div class="modal" style="background:var(--foam);border-radius:10px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.5);">
    <div class="modal-header" style="background:var(--ocean);color:var(--sand);padding:16px 20px;display:flex;justify-content:space-between;">
      <input type="text" id="modalNestId" style="font-weight:700;font-size:1rem;width:60px" onchange="renameNest()">
      <button onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" style="padding:20px;">
      <label>Estado:</label>
      <select id="f_state" onchange="changeState(this.value)">
        <option value="vazio">Vazio</option>
        <option value="ativo">Ativo</option>
        <option value="eclodido">Eclodido</option>
        <option value="exumado">Exumado</option>
        <option value="monitorizar">Monitorizar</option>
      </select>
      <label>Data Colocação:</label>
      <input type="date" id="f_data_coloc" onchange="calcDates()">
      <label>PIT da Fêmea:</label>
      <input type="text" id="f_pit">
      <label>Nº Ovos:</label>
      <input type="number" id="f_ovos">
      <label>Dia 50 (prev. eclosão):</label>
      <input type="text" id="f_dia50" readonly>
      <label>Dia 60 (exumação):</label>
      <input type="text" id="f_dia60" readonly>
      <label>Observações:</label>
      <textarea id="f_obs"></textarea>
    </div>
    <div class="modal-footer" style="display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid #d8d0b8;">
      <button class="btn btn-red" onclick="clearNest()">Limpar</button>
      <button class="btn btn-green" onclick="saveNest()">💾 Guardar</button>
      <button class="btn btn-ocean" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
let nests={}; let settings={projeto:'Tartarugario 2025'}; let currentNestId=null;
const STORAGE_KEY='viveiro_nests_v2';

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(nests));}
function load(){try{nests=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');}catch{nests={}}}

function buildGrid(){
  const cols=parseInt(document.getElementById('cols').value)||25;
  const rows=parseInt(document.getElementById('rows').value)||40;
  const grid=document.getElementById('grid');
  grid.style.gridTemplateColumns=`repeat(${cols},44px)`;
  grid.innerHTML='';
  for(let i=1;i<=cols*rows;i++){
    const id=i;
    const cell=document.createElement('div');
    cell.className='nest-cell';
    cell.dataset.id=id;
    cell.onclick=()=>openNest(id);
    cell.textContent=id;
    grid.appendChild(cell);
    refreshCell(id);
  }
  updateStats();
}

function refreshCell(id){
  const cell=document.querySelector(`[data-id='${id}']`);
  if(!cell)return;
  const n=nests[id]||{};
  cell.className='nest-cell state-'+(n.state||'vazio');
  cell.textContent=id;
}

function openNest(id){
  currentNestId=id;
  const n=nests[id]||{};
  document.getElementById('modalNestId').value=id;
  document.getElementById('f_state').value=n.state||'vazio';
  document.getElementById('f_data_coloc').value=n.data_coloc||'';
  document.getElementById('f_pit').value=n.pit||'';
  document.getElementById('f_ovos').value=n.ovos||'';
  document.getElementById('f_obs').value=n.obs||'';
  calcDates();
  document.getElementById('nestModal').style.display='flex';
}

function closeModal(){document.getElementById('nestModal').style.display='none'; buildGrid(); updateStats();}

function saveNest(){
  const id=currentNestId;
  nests[id]={
    state:document.getElementById('f_state').value,
    data_coloc:document.getElementById('f_data_coloc').value,
    pit:document.getElementById('f_pit').value,
    ovos:document.getElementById('f_ovos').value,
    obs:document.getElementById('f_obs').value
  };
  save();
  closeModal();
}

function clearNest(){delete nests[currentNestId]; save(); closeModal();}

function calcDates(){
  const val=document.getElementById('f_data_coloc').value;
  if(!val)return;
  const d=new Date(val);
  document.getElementById('f_dia50').value=new Date(d.getTime()+50*86400000).toLocaleDateString('pt-PT');
  document.getElementById('f_dia60').value=new Date(d.getTime()+60*86400000).toLocaleDateString('pt-PT');
}

function changeState(s){document.getElementById('f_state').value=s;}

function renameNest(){
  const newId=document.getElementById('modalNestId').value.trim();
  if(newId===currentNestId)return;
  nests[newId]=nests[currentNestId];
  delete nests[currentNestId];
  currentNestId=newId;
  save();
  buildGrid();
}

function updateStats(){
  const total=Object.keys(nests).length;
  document.getElementById('stats').innerHTML='Total Ninhos: '+total;
}

function exportCSV(){
  let csv='Ninho,Estado,Data Coloc,PIT,Ovos,Obs\n';
  Object.entries(nests).forEach(([id,n])=>{
    csv+=`${id},${n.state||''},${n.data_coloc||''},${n.pit||''},${n.ovos||''},${n.obs||''}\n`;
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='viveiro.csv';
  a.click();
}

function backup(){
  const data=JSON.stringify(nests);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='viveiro_backup.json';
  a.click();
}

load();
buildGrid();
</script>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js');}
</script>

</body>
</html>
